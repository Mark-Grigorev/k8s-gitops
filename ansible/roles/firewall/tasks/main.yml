- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Reset ufw to defaults
  community.general.ufw:
    state: reset

- name: Default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: Default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow kube-apiserver (optional, for kubectl from outside)
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Allow all traffic on lo (loopback)
  community.general.ufw:
    rule: allow
    interface: lo
    direction: in

- name: Allow pod network (Cilium)
  community.general.ufw:
    rule: allow
    src: "10.0.0.0/8"

- name: Enable unf
  community.general.ufw:
    state: enabled
