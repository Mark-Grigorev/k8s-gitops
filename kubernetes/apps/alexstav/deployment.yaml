apiVersion: v1
kind: Deployment
metadata:
  name: alexstav
  namespace: alexstav
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alexstav
    template:
      metadata:
        labels:
          app: alexstav
      spec:
        containers:
          - name: nginx
            image: nginx:alpine
            ports:
              - containerPort: 80
            volumeMounts:
              - name: html
                mountPath: /usr/share/nginx/html
        volumes:
          - name: html
            configMap:
              name: alexstav-html
