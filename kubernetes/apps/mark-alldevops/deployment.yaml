apiVersion: apps/v1
kind: Deployment
metadata:
  name: mark-alldevops
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mark-alldevops
  template:
    metadata:
      labels:
        app: mark-alldevops
    spec:
      containers:
        - name: nginx
          image: ghcr.io/mark-grigorev/mark-alldevops:latest
          ports:
            - containerPort: 80
          resources:
            requests: 
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 20m
              memory: 64Mi
