apiVersion: apps/v1
kind: Deployment
metadata:
  name: fingo
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fingo
  template:
    metadata:
      labels:
        app: fingo
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "fingo"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/fingo"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/fingo" -}}
          export DB_CONN_STRING="{{ .Data.data.DB_CONN_STRING }}"
          export APP_PORT="{{ .Data.data.APP_PORT }}"
          export APP_ENV="{{ .Data.data.APP_ENV }}"
          export APP_BASE_URL="{{ .Data.data.APP_BASE_URL }}"
          export RESEND_API_KEY="{{ .Data.data.RESEND_API_KEY }}"
          export TOKEN_DURATION="{{ .Data.data.TOKEN_DURATION }}"
          {{- end }}
    spec:
      serviceAccountName: fingo
      containers:
        - name: nginx
          image: ghcr.io/mark-grigorev/fingo:latest
          ports:
            - containerPort: 80
              targetPort: 8080
          resources:
            requests: 
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 20m
              memory: 64Mi
      